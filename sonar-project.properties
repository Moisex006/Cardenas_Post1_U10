# Identificacion del proyecto en SonarQube local.
sonar.projectKey=com.universidad:productos-service
sonar.projectName=Productos Service
sonar.projectVersion=1.0

# Rutas de codigo fuente, pruebas y clases compiladas.
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# Integracion con el reporte XML generado por JaCoCo.
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# La clase de arranque no aporta logica de negocio al analisis inicial.
sonar.exclusions=**/*Application.java

# Servidor SonarQube local del laboratorio.
sonar.host.url=http://localhost:9000

# Se deja en false para que el laboratorio no bloquee la ejecucion local.
sonar.qualitygate.wait=false
